<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg"
     style="max-width: 100%; height: auto; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;">
  <rect width="800" height="480" fill="#fafafa" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-size="14" fill="#6b7280" font-weight="500">
    공개형 vs 허가형 블록체인 — 같은 기술이 아니다
  </text>

  <defs>
    <marker id="arrowMint" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5fb3a8"/>
    </marker>
    <marker id="arrowCoral" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#b8404d"/>
    </marker>
  </defs>

  <!-- 상단 그룹: 공개형 (인터넷 비유) -->
  <g>
    <rect x="40" y="60" width="720" height="170" rx="10" fill="#fffafa" stroke="#fdc4ca" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="60" y="85" font-size="13" fill="#b8404d" font-weight="600">🌐 공개형 (Public) — 인터넷 같은 구조</text>

    <!-- 익명 참가자들 -->
    <rect x="80" y="115" width="160" height="60" rx="8" fill="#fdf1f2" stroke="#b8404d" stroke-width="1.5"/>
    <text x="160" y="140" text-anchor="middle" font-size="13" fill="#2a2a2a" font-weight="600">익명 참가자 다수</text>
    <text x="160" y="158" text-anchor="middle" font-size="11" fill="#6b7280">누구나 검증자 참여</text>

    <line x1="245" y1="145" x2="295" y2="145" stroke="#b8404d" stroke-width="1.5" marker-end="url(#arrowCoral)"/>
    <text x="270" y="138" text-anchor="middle" font-size="10" fill="#b8404d" font-weight="600">신뢰 X</text>

    <!-- 합의 (확률적) -->
    <rect x="300" y="115" width="160" height="60" rx="8" fill="#fdf1f2" stroke="#b8404d" stroke-width="1.5"/>
    <text x="380" y="140" text-anchor="middle" font-size="13" fill="#2a2a2a" font-weight="600">확률적 합의</text>
    <text x="380" y="158" text-anchor="middle" font-size="11" fill="#6b7280">PoW / PoS, 12초~10분</text>

    <line x1="465" y1="145" x2="500" y2="145" stroke="#b8404d" stroke-width="1" stroke-dasharray="3,3"/>

    <rect x="500" y="115" width="240" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="620" y="140" text-anchor="middle" font-size="12" fill="#b8404d" font-weight="600">⚠️ 가스비 필수, TPS 15~30</text>
    <text x="620" y="158" text-anchor="middle" font-size="11" fill="#6b7280">스팸 방어 + 검증자 보상 필요</text>

    <text x="60" y="205" font-size="11" fill="#6b7280">→ 누구도 신뢰 안 됨. 그래서 비싸고 느림</text>
  </g>

  <!-- 하단 그룹: 허가형 (인트라넷 비유) -->
  <g>
    <rect x="40" y="250" width="720" height="190" rx="10" fill="#f8fcfa" stroke="#a7d4c1" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="60" y="275" font-size="13" fill="#4a8b6f" font-weight="600">🔒 허가형 (Permissioned) — 사내 인트라넷 같은 구조</text>

    <!-- 식별된 검증자 -->
    <rect x="80" y="305" width="160" height="60" rx="8" fill="#f0f7f3" stroke="#4a8b6f" stroke-width="1.5"/>
    <text x="160" y="330" text-anchor="middle" font-size="13" fill="#2a2a2a" font-weight="600">식별된 검증자</text>
    <text x="160" y="348" text-anchor="middle" font-size="11" fill="#6b7280">은행·기관 4~20개</text>

    <line x1="245" y1="335" x2="295" y2="335" stroke="#5fb3a8" stroke-width="1.5" marker-end="url(#arrowMint)"/>
    <text x="270" y="328" text-anchor="middle" font-size="10" fill="#5fb3a8" font-weight="600">신뢰 O</text>

    <!-- BFT 합의 (확정적) -->
    <rect x="300" y="305" width="160" height="60" rx="8" fill="#f0f7f3" stroke="#4a8b6f" stroke-width="1.5"/>
    <text x="380" y="330" text-anchor="middle" font-size="13" fill="#2a2a2a" font-weight="600">확정적 합의</text>
    <text x="380" y="348" text-anchor="middle" font-size="11" fill="#6b7280">BFT 계열, 1~2초</text>

    <line x1="465" y1="335" x2="515" y2="335" stroke="#5fb3a8" stroke-width="1.5" marker-end="url(#arrowMint)"/>

    <rect x="520" y="305" width="160" height="60" rx="8" fill="#f0f7f3" stroke="#4a8b6f" stroke-width="1.5"/>
    <text x="600" y="330" text-anchor="middle" font-size="13" fill="#2a2a2a" font-weight="600">즉시 확정</text>
    <text x="600" y="348" text-anchor="middle" font-size="11" fill="#6b7280">1블록이면 끝</text>

    <!-- 안전 마커 -->
    <rect x="80" y="385" width="600" height="40" rx="8" fill="#ecf6f3" stroke="#a7d4c1" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="380" y="410" text-anchor="middle" font-size="12" fill="#4a8b6f" font-weight="600">✅ 가스비 0원 가능, TPS 수백~수천</text>
  </g>

  <text x="400" y="465" text-anchor="middle" font-size="11" fill="#9ca3af">
    그림 — 블록체인 한 덩어리로 부르지만, 신뢰 모델에 따라 트레이드오프가 완전히 다르다
  </text>
</svg>
