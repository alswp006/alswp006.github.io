<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg"
     style="max-width: 100%; height: auto; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;">
  <rect width="800" height="340" fill="#fafafa" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-size="14" fill="#6b7280" font-weight="500">
    결제 표준의 일반 채택까지 걸린 시간
  </text>

  <!-- 막대 1: 마그네틱 카드 40년 -->
  <g>
    <text x="210" y="80" text-anchor="end" font-size="13" fill="#2a2a2a" font-weight="500">마그네틱 카드</text>
    <rect x="220" y="65" width="520" height="26" rx="4" fill="#2c7a8c" opacity="0.7"/>
    <text x="730" y="83" text-anchor="end" font-size="12" fill="#ffffff" font-weight="600">40년</text>
    <text x="210" y="95" text-anchor="end" font-size="10" fill="#9ca3af">1960s → 2000s</text>
  </g>

  <!-- 막대 2: EMV 칩카드 20년 -->
  <g>
    <text x="210" y="125" text-anchor="end" font-size="13" fill="#2a2a2a" font-weight="500">EMV 칩카드</text>
    <rect x="220" y="110" width="260" height="26" rx="4" fill="#2c7a8c" opacity="0.7"/>
    <text x="470" y="128" text-anchor="end" font-size="12" fill="#ffffff" font-weight="600">20년</text>
    <text x="210" y="140" text-anchor="end" font-size="10" fill="#9ca3af">1994 → 2015</text>
  </g>

  <!-- 막대 3: Apple Pay 8년 -->
  <g>
    <text x="210" y="170" text-anchor="end" font-size="13" fill="#2a2a2a" font-weight="500">Apple Pay</text>
    <rect x="220" y="155" width="104" height="26" rx="4" fill="#2c7a8c" opacity="0.7"/>
    <text x="334" y="173" font-size="12" fill="#1a4d5c" font-weight="600">8년</text>
    <text x="210" y="185" text-anchor="end" font-size="10" fill="#9ca3af">2014 → 2022</text>
  </g>

  <!-- 막대 4: QR 결제 5년 -->
  <g>
    <text x="210" y="215" text-anchor="end" font-size="13" fill="#2a2a2a" font-weight="500">QR 결제 (한국)</text>
    <rect x="220" y="200" width="65" height="26" rx="4" fill="#2c7a8c" opacity="0.7"/>
    <text x="295" y="218" font-size="12" fill="#1a4d5c" font-weight="600">5년</text>
    <text x="210" y="230" text-anchor="end" font-size="10" fill="#9ca3af">2015 → 2020</text>
  </g>

  <!-- 막대 5: x402 1년 (오렌지 강조) -->
  <g>
    <text x="210" y="260" text-anchor="end" font-size="13" fill="#d97757" font-weight="700">x402</text>
    <rect x="220" y="245" width="13" height="26" rx="4" fill="#d97757"/>
    <text x="243" y="263" font-size="12" fill="#d97757" font-weight="700">1년 ⚡</text>
    <text x="210" y="275" text-anchor="end" font-size="10" fill="#d97757">2025.5 → 2026.4</text>
  </g>

  <!-- X축 -->
  <line x1="220" y1="290" x2="740" y2="290" stroke="#9ca3af" stroke-width="1"/>
  <text x="220" y="307" text-anchor="middle" font-size="10" fill="#9ca3af">0</text>
  <text x="350" y="307" text-anchor="middle" font-size="10" fill="#9ca3af">10년</text>
  <text x="480" y="307" text-anchor="middle" font-size="10" fill="#9ca3af">20년</text>
  <text x="610" y="307" text-anchor="middle" font-size="10" fill="#9ca3af">30년</text>
  <text x="740" y="307" text-anchor="middle" font-size="10" fill="#9ca3af">40년</text>

  <text x="400" y="328" text-anchor="middle" font-size="11" fill="#9ca3af">
    그림 — x402의 1년 채택은 결제 표준 역사상 가장 빠른 속도
  </text>
</svg>
