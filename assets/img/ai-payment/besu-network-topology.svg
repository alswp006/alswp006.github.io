<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg"
     style="max-width: 100%; height: auto; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;">
  <rect width="800" height="460" fill="#fafafa" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-size="14" fill="#6b7280" font-weight="500">
    PoC로 띄운 Besu QBFT 4-validator 네트워크 구조
  </text>

  <!-- Docker 네트워크 전체 컨테이너 -->
  <rect x="40" y="65" width="720" height="320" rx="12" fill="#ffffff" stroke="#2c7a8c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="60" y="88" font-size="12" fill="#2c7a8c" font-weight="600">🐳 Docker Network (10.5.0.0/16)</text>

  <!-- 4개 Validator (사각형 배치) -->
  <!-- Validator 1 (Bootnode - 강조) -->
  <g>
    <rect x="100" y="110" width="220" height="100" rx="10" fill="#fdf3ee" stroke="#d97757" stroke-width="2"/>
    <text x="120" y="138" font-size="18" fill="#d97757">👑</text>
    <text x="210" y="135" text-anchor="middle" font-size="13" fill="#2a2a2a" font-weight="700">Validator 1 (Bootnode)</text>
    <text x="210" y="155" text-anchor="middle" font-size="10" fill="#6b7280">10.5.0.2 : 30303</text>
    <line x1="120" y1="165" x2="300" y2="165" stroke="#d97757" stroke-width="1" opacity="0.3"/>
    <text x="120" y="183" font-size="10" fill="#2a2a2a">enode 주소 노출</text>
    <text x="120" y="199" font-size="10" fill="#6b7280">--min-gas-price=0</text>
  </g>

  <!-- Validator 2 -->
  <g>
    <rect x="480" y="110" width="220" height="100" rx="10" fill="#e8f1f4" stroke="#2c7a8c" stroke-width="1.5"/>
    <text x="500" y="138" font-size="18" fill="#2c7a8c">🛡️</text>
    <text x="590" y="135" text-anchor="middle" font-size="13" fill="#2a2a2a" font-weight="700">Validator 2</text>
    <text x="590" y="155" text-anchor="middle" font-size="10" fill="#6b7280">10.5.0.3 : 30303</text>
    <line x1="500" y1="165" x2="680" y2="165" stroke="#2c7a8c" stroke-width="1" opacity="0.3"/>
    <text x="500" y="183" font-size="10" fill="#2a2a2a">bootnodes=enode://...</text>
    <text x="500" y="199" font-size="10" fill="#6b7280">--min-gas-price=0</text>
  </g>

  <!-- Validator 3 -->
  <g>
    <rect x="100" y="240" width="220" height="100" rx="10" fill="#e8f1f4" stroke="#2c7a8c" stroke-width="1.5"/>
    <text x="120" y="268" font-size="18" fill="#2c7a8c">🛡️</text>
    <text x="210" y="265" text-anchor="middle" font-size="13" fill="#2a2a2a" font-weight="700">Validator 3</text>
    <text x="210" y="285" text-anchor="middle" font-size="10" fill="#6b7280">10.5.0.4 : 30303</text>
    <line x1="120" y1="295" x2="300" y2="295" stroke="#2c7a8c" stroke-width="1" opacity="0.3"/>
    <text x="120" y="313" font-size="10" fill="#2a2a2a">bootnodes=enode://...</text>
    <text x="120" y="329" font-size="10" fill="#6b7280">--min-gas-price=0</text>
  </g>

  <!-- Validator 4 -->
  <g>
    <rect x="480" y="240" width="220" height="100" rx="10" fill="#e8f1f4" stroke="#2c7a8c" stroke-width="1.5"/>
    <text x="500" y="268" font-size="18" fill="#2c7a8c">🛡️</text>
    <text x="590" y="265" text-anchor="middle" font-size="13" fill="#2a2a2a" font-weight="700">Validator 4</text>
    <text x="590" y="285" text-anchor="middle" font-size="10" fill="#6b7280">10.5.0.5 : 30303</text>
    <line x1="500" y1="295" x2="680" y2="295" stroke="#2c7a8c" stroke-width="1" opacity="0.3"/>
    <text x="500" y="313" font-size="10" fill="#2a2a2a">bootnodes=enode://...</text>
    <text x="500" y="329" font-size="10" fill="#6b7280">--min-gas-price=0</text>
  </g>

  <!-- P2P 연결선들 (서로 풀 메쉬) -->
  <line x1="320" y1="160" x2="480" y2="160" stroke="#5fb3a8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="210" y1="210" x2="210" y2="240" stroke="#5fb3a8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="590" y1="210" x2="590" y2="240" stroke="#5fb3a8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="320" y1="290" x2="480" y2="290" stroke="#5fb3a8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="320" y1="180" x2="480" y2="270" stroke="#5fb3a8" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="320" y1="270" x2="480" y2="180" stroke="#5fb3a8" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- P2P 라벨 -->
  <rect x="350" y="215" width="100" height="22" rx="4" fill="#ecf6f3"/>
  <text x="400" y="230" text-anchor="middle" font-size="10" fill="#5fb3a8" font-weight="700">QBFT P2P</text>

  <!-- 외부 RPC 진입점 (Docker 컨테이너 바깥) -->
  <g>
    <rect x="280" y="395" width="240" height="40" rx="8" fill="#fdf1f2" stroke="#b8404d" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="400" y="412" text-anchor="middle" font-size="11" fill="#b8404d" font-weight="600">🌍 외부 클라이언트 (Hardhat / ethers.js)</text>
    <text x="400" y="427" text-anchor="middle" font-size="10" fill="#6b7280">localhost:8545 → 노드 1번 RPC</text>
  </g>
  <line x1="400" y1="385" x2="400" y2="395" stroke="#b8404d" stroke-width="1.5" stroke-dasharray="3,2"/>

  <text x="400" y="453" text-anchor="middle" font-size="11" fill="#9ca3af">
    그림 — 함정 3 (Bootnode enode 주소를 먼저 알아야 다른 노드가 접속 가능)
  </text>
</svg>
