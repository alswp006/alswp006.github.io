<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg"
     style="max-width: 100%; height: auto; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;">
  <rect width="800" height="480" fill="#fafafa" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-size="14" fill="#6b7280" font-weight="500">
    Besu vs Fabric — 어떻게 선택하는가
  </text>

  <defs>
    <marker id="arrowMintBV" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5fb3a8"/>
    </marker>
  </defs>

  <!-- Root: 핵심 질문 -->
  <g>
    <rect x="220" y="60" width="360" height="70" rx="10" fill="#1a4d5c"/>
    <text x="400" y="88" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="700">❓ 핵심 질문</text>
    <text x="400" y="111" text-anchor="middle" font-size="12" fill="#a7d4c1">"이더리움 생태계 도구를 그대로 쓰고 싶은가?"</text>
  </g>

  <!-- 연결선 → YES / NO -->
  <line x1="400" y1="135" x2="220" y2="170" stroke="#5fb3a8" stroke-width="2" marker-end="url(#arrowMintBV)"/>
  <text x="290" y="155" font-size="13" fill="#5fb3a8" font-weight="700">YES</text>

  <line x1="400" y1="135" x2="580" y2="170" stroke="#5fb3a8" stroke-width="2" marker-end="url(#arrowMintBV)"/>
  <text x="510" y="155" font-size="13" fill="#5fb3a8" font-weight="700">NO</text>

  <!-- 좌측: Besu 선택 -->
  <g>
    <rect x="40" y="180" width="350" height="240" rx="10" fill="#fdf3ee" stroke="#d97757" stroke-width="2"/>
    <text x="215" y="210" text-anchor="middle" font-size="16" fill="#d97757" font-weight="700">⛓️ Hyperledger Besu</text>
    <text x="215" y="230" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">EVM 호환 허가형</text>

    <line x1="60" y1="245" x2="370" y2="245" stroke="#d97757" stroke-width="1" opacity="0.3"/>

    <text x="60" y="270" font-size="11" fill="#2a2a2a" font-weight="600">✓ 이런 경우 적합</text>
    <text x="60" y="290" font-size="11" fill="#2a2a2a">• x402, ERC-20, EIP-712 활용</text>
    <text x="60" y="310" font-size="11" fill="#2a2a2a">• 공개 체인과 상호운용 가능성</text>
    <text x="60" y="330" font-size="11" fill="#2a2a2a">• AI 결제 / DeFi 표준 채택</text>
    <text x="60" y="350" font-size="11" fill="#2a2a2a">• 외부 지갑(MetaMask) 연동</text>
    <text x="60" y="370" font-size="11" fill="#2a2a2a">• 글로벌 개발자 풀 활용</text>

    <rect x="60" y="385" width="310" height="22" rx="4" fill="#d97757" opacity="0.15"/>
    <text x="215" y="400" text-anchor="middle" font-size="11" fill="#d97757" font-weight="700">→ AI 결제 인프라의 거의 유일한 선택지</text>
  </g>

  <!-- 우측: Fabric 선택 -->
  <g>
    <rect x="410" y="180" width="350" height="240" rx="10" fill="#e8f1f4" stroke="#2c7a8c" stroke-width="2"/>
    <text x="585" y="210" text-anchor="middle" font-size="16" fill="#1a4d5c" font-weight="700">🧵 Hyperledger Fabric</text>
    <text x="585" y="230" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">자체 표준 허가형</text>

    <line x1="430" y1="245" x2="740" y2="245" stroke="#2c7a8c" stroke-width="1" opacity="0.3"/>

    <text x="430" y="270" font-size="11" fill="#2a2a2a" font-weight="600">✓ 이런 경우 적합</text>
    <text x="430" y="290" font-size="11" fill="#2a2a2a">• 완전히 폐쇄된 컨소시엄</text>
    <text x="430" y="310" font-size="11" fill="#2a2a2a">• 표준 호환 필요 없음</text>
    <text x="430" y="330" font-size="11" fill="#2a2a2a">• 채널별 격리(다자 거래) 중요</text>
    <text x="430" y="350" font-size="11" fill="#2a2a2a">• 운영 사례·레퍼런스 풍부</text>
    <text x="430" y="370" font-size="11" fill="#2a2a2a">• 공급망·물류·헬스케어 등</text>

    <rect x="430" y="385" width="310" height="22" rx="4" fill="#2c7a8c" opacity="0.15"/>
    <text x="585" y="400" text-anchor="middle" font-size="11" fill="#1a4d5c" font-weight="700">→ 가장 많이 쓰이는 기업용 블록체인</text>
  </g>

  <text x="400" y="455" text-anchor="middle" font-size="11" fill="#9ca3af">
    그림 — 한 줄로 답이 갈린다. AI 결제는 x402 위에서 동작하므로 EVM 호환이 사실상 필수
  </text>
</svg>
