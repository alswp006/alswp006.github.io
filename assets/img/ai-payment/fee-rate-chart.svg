<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg"
     style="max-width: 100%; height: auto; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;">
  <rect width="800" height="360" fill="#fafafa" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-size="14" fill="#6b7280" font-weight="500">
    결제 금액별 수수료 비율 (고정비 $0.30 기준)
  </text>

  <text x="35" y="60" font-size="11" fill="#6b7280" font-weight="500">수수료율 (%)</text>

  <line x1="80" y1="70" x2="760" y2="70" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="74" text-anchor="end" font-size="10" fill="#9ca3af">3000%</text>

  <line x1="80" y1="150" x2="760" y2="150" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="154" text-anchor="end" font-size="10" fill="#9ca3af">600%</text>

  <line x1="80" y1="210" x2="760" y2="210" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="214" text-anchor="end" font-size="10" fill="#9ca3af">60%</text>

  <line x1="80" y1="260" x2="760" y2="260" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="264" text-anchor="end" font-size="10" fill="#9ca3af">6%</text>

  <line x1="80" y1="280" x2="760" y2="280" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Bar 1: $0.01 = 3000% -->
  <rect x="100" y="70" width="55" height="210" rx="4" fill="#b8404d"/>
  <text x="127" y="63" text-anchor="middle" font-size="11" fill="#b8404d" font-weight="700">3000%</text>
  <text x="127" y="300" text-anchor="middle" font-size="11" fill="#2a2a2a" font-weight="500">$0.01</text>

  <!-- Bar 2: $0.05 = 600% -->
  <rect x="185" y="150" width="55" height="130" rx="4" fill="#b8404d" opacity="0.85"/>
  <text x="212" y="143" text-anchor="middle" font-size="11" fill="#b8404d" font-weight="700">600%</text>
  <text x="212" y="300" text-anchor="middle" font-size="11" fill="#2a2a2a" font-weight="500">$0.05</text>

  <!-- Bar 3: $0.10 = 300% -->
  <rect x="270" y="170" width="55" height="110" rx="4" fill="#b8404d" opacity="0.7"/>
  <text x="297" y="163" text-anchor="middle" font-size="11" fill="#b8404d" font-weight="700">300%</text>
  <text x="297" y="300" text-anchor="middle" font-size="11" fill="#2a2a2a" font-weight="500">$0.10</text>

  <!-- Bar 4: $0.50 = 60% -->
  <rect x="355" y="210" width="55" height="70" rx="4" fill="#f59e0b" opacity="0.85"/>
  <text x="382" y="203" text-anchor="middle" font-size="11" fill="#78350f" font-weight="700">60%</text>
  <text x="382" y="300" text-anchor="middle" font-size="11" fill="#2a2a2a" font-weight="500">$0.50</text>

  <!-- Bar 5: $1.00 = 30% -->
  <rect x="440" y="230" width="55" height="50" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="467" y="223" text-anchor="middle" font-size="11" fill="#78350f" font-weight="700">30%</text>
  <text x="467" y="300" text-anchor="middle" font-size="11" fill="#2a2a2a" font-weight="500">$1.00</text>

  <!-- Bar 6: $5.00 = 6% -->
  <rect x="525" y="260" width="55" height="20" rx="4" fill="#4a8b6f"/>
  <text x="552" y="253" text-anchor="middle" font-size="11" fill="#4a8b6f" font-weight="700">6%</text>
  <text x="552" y="300" text-anchor="middle" font-size="11" fill="#2a2a2a" font-weight="500">$5.00</text>

  <!-- Bar 7: $10 = 3% -->
  <rect x="610" y="270" width="55" height="10" rx="4" fill="#4a8b6f" opacity="0.8"/>
  <text x="637" y="263" text-anchor="middle" font-size="11" fill="#4a8b6f" font-weight="700">3%</text>
  <text x="637" y="300" text-anchor="middle" font-size="11" fill="#2a2a2a" font-weight="500">$10</text>

  <!-- Bar 8: $50 = 0.6% -->
  <rect x="695" y="278" width="55" height="2" rx="2" fill="#4a8b6f" opacity="0.6"/>
  <text x="722" y="271" text-anchor="middle" font-size="11" fill="#4a8b6f" font-weight="700">0.6%</text>
  <text x="722" y="300" text-anchor="middle" font-size="11" fill="#2a2a2a" font-weight="500">$50</text>

  <!-- 영역 라벨 -->
  <text x="212" y="328" text-anchor="middle" font-size="11" fill="#b8404d" font-weight="600">⚠️ 마이크로페이먼트 불가</text>
  <text x="467" y="328" text-anchor="middle" font-size="11" fill="#78350f" font-weight="600">경계 영역</text>
  <text x="637" y="328" text-anchor="middle" font-size="11" fill="#4a8b6f" font-weight="600">✓ 정상 영역</text>

  <text x="400" y="350" text-anchor="middle" font-size="11" fill="#9ca3af">
    그림 — $0.10 결제는 수수료가 300%, 카드망 위 마이크로페이먼트가 수학적으로 불가능한 이유
  </text>
</svg>
