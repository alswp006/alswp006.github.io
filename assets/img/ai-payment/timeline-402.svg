<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg"
     style="max-width: 100%; height: auto; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;">
  <rect width="1000" height="360" fill="#fafafa" rx="12"/>

  <text x="500" y="35" text-anchor="middle" font-size="14" fill="#6b7280" font-weight="500">
    HTTP 402 — 30년의 침묵과 부활
  </text>

  <!-- 시대 구분 배경 -->
  <rect x="50" y="60" width="720" height="220" rx="8" fill="#f3f4f6" opacity="0.6"/>
  <rect x="770" y="60" width="180" height="220" rx="8" fill="#f0f7f3" opacity="0.7"/>

  <text x="410" y="80" text-anchor="middle" font-size="12" fill="#6b7280" font-weight="600" letter-spacing="1">
    🌙  30년의 침묵 (1997~2024)
  </text>
  <text x="860" y="80" text-anchor="middle" font-size="12" fill="#4a8b6f" font-weight="600" letter-spacing="1">
    ⚡ 부활 (2025~)
  </text>

  <!-- 타임라인 라인 -->
  <line x1="50" y1="180" x2="950" y2="180" stroke="#d1d5db" stroke-width="2"/>

  <!-- 1997 RFC -->
  <circle cx="80" cy="180" r="9" fill="#1a4d5c"/>
  <line x1="80" y1="171" x2="80" y2="130" stroke="#1a4d5c" stroke-width="1.5"/>
  <text x="80" y="120" text-anchor="middle" font-size="13" fill="#1a4d5c" font-weight="700">1997</text>
  <text x="80" y="105" text-anchor="middle" font-size="10" fill="#6b7280">RFC 2616</text>
  <text x="80" y="92" text-anchor="middle" font-size="10" fill="#6b7280">"Payment Required" 예약</text>

  <!-- 1994-1996 (아래) -->
  <circle cx="160" cy="180" r="6" fill="#b8404d"/>
  <line x1="160" y1="186" x2="160" y2="220" stroke="#b8404d" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="160" y="237" text-anchor="middle" font-size="12" fill="#b8404d" font-weight="600">1994-1996</text>
  <text x="160" y="253" text-anchor="middle" font-size="10" fill="#6b7280">FirstVirtual·CyberCash</text>
  <text x="160" y="266" text-anchor="middle" font-size="10" fill="#6b7280">Millicent — 카드 수수료 벽</text>

  <!-- 1999 W3C (위) -->
  <circle cx="270" cy="180" r="6" fill="#b8404d"/>
  <line x1="270" y1="171" x2="270" y2="138" stroke="#b8404d" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="270" y="128" text-anchor="middle" font-size="12" fill="#b8404d" font-weight="600">1999</text>
  <text x="270" y="113" text-anchor="middle" font-size="10" fill="#6b7280">W3C 마이크로페이먼트</text>
  <text x="270" y="100" text-anchor="middle" font-size="10" fill="#6b7280">워킹그룹 — 표준화 실패</text>

  <!-- 1999-2001 Flooz (아래) -->
  <circle cx="370" cy="180" r="6" fill="#b8404d"/>
  <line x1="370" y1="186" x2="370" y2="220" stroke="#b8404d" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="370" y="237" text-anchor="middle" font-size="12" fill="#b8404d" font-weight="600">1999-2001</text>
  <text x="370" y="253" text-anchor="middle" font-size="10" fill="#6b7280">Flooz — 닷컴 버블과</text>
  <text x="370" y="266" text-anchor="middle" font-size="10" fill="#6b7280">함께 종료</text>

  <!-- 2016-2018 Lightning (위) -->
  <circle cx="510" cy="180" r="6" fill="#f59e0b"/>
  <line x1="510" y1="171" x2="510" y2="138" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="510" y="128" text-anchor="middle" font-size="12" fill="#78350f" font-weight="600">2016-2018</text>
  <text x="510" y="113" text-anchor="middle" font-size="10" fill="#6b7280">Bitcoin Lightning</text>
  <text x="510" y="100" text-anchor="middle" font-size="10" fill="#6b7280">— 부분 성공</text>

  <!-- 2017-2019 Brave BAT (아래) -->
  <circle cx="640" cy="180" r="6" fill="#f59e0b"/>
  <line x1="640" y1="186" x2="640" y2="220" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="640" y="237" text-anchor="middle" font-size="12" fill="#78350f" font-weight="600">2017-2019</text>
  <text x="640" y="253" text-anchor="middle" font-size="10" fill="#6b7280">Brave BAT</text>
  <text x="640" y="266" text-anchor="middle" font-size="10" fill="#6b7280">— 광고 영역만</text>

  <!-- 2025.5 x402 V1 (위) -->
  <circle cx="800" cy="180" r="9" fill="#4a8b6f"/>
  <line x1="800" y1="171" x2="800" y2="135" stroke="#4a8b6f" stroke-width="1.5"/>
  <text x="800" y="125" text-anchor="middle" font-size="13" fill="#4a8b6f" font-weight="700">2025.5</text>
  <text x="800" y="110" text-anchor="middle" font-size="10" fill="#6b7280">Coinbase x402 V1</text>
  <text x="800" y="97" text-anchor="middle" font-size="10" fill="#6b7280">출시</text>

  <!-- 2025.12 V2 (아래) -->
  <circle cx="870" cy="180" r="6" fill="#4a8b6f"/>
  <line x1="870" y1="186" x2="870" y2="220" stroke="#4a8b6f" stroke-width="1.5"/>
  <text x="870" y="237" text-anchor="middle" font-size="12" fill="#4a8b6f" font-weight="600">2025.12</text>
  <text x="870" y="253" text-anchor="middle" font-size="10" fill="#6b7280">x402 V2</text>
  <text x="870" y="266" text-anchor="middle" font-size="10" fill="#6b7280">사양 안정화</text>

  <!-- 2026.4 (위, 오렌지) -->
  <circle cx="930" cy="180" r="9" fill="#d97757"/>
  <line x1="930" y1="171" x2="930" y2="135" stroke="#d97757" stroke-width="1.5"/>
  <text x="930" y="125" text-anchor="middle" font-size="13" fill="#d97757" font-weight="700">2026.4</text>
  <text x="930" y="110" text-anchor="middle" font-size="10" fill="#6b7280">누적 거래</text>
  <text x="930" y="97" text-anchor="middle" font-size="11" fill="#d97757" font-weight="700">1.65억 건 ⚡</text>

  <text x="500" y="335" text-anchor="middle" font-size="11" fill="#9ca3af">
    그림 — 30년의 침묵 후 1년 만에 일어난 폭발. HTTP 402는 시대를 기다린 표준이었다
  </text>
</svg>
