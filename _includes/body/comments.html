{% if site.comments.provider == 'giscus' %}
<section class="comments" id="comments">
  <script src="https://giscus.app/client.js"
    data-repo="{{ site.comments.giscus.repo }}"
    data-repo-id="{{ site.comments.giscus.repo-id }}"
    data-category="{{ site.comments.giscus.category | default: 'Announcements' }}"
    data-category-id="{{ site.comments.giscus.category-id }}"
    data-mapping="{{ site.comments.giscus.mapping | default: 'pathname' }}"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="{{ site.comments.giscus.input-position | default: 'bottom' }}"
    data-theme="{{ site.comments.giscus.theme | default: 'preferred_color_scheme' }}"
    data-lang="{{ site.comments.giscus.lang | default: 'ko' }}"
    crossorigin="anonymous"
    async>
  </script>
</section>
{% elsif site.comments.provider == 'utterances' %}
<section class="comments" id="comments">
  <script src="https://utteranc.es/client.js"
    repo="{{ site.comments.utterances.repo }}"
    issue-term="{{ site.comments.utterances.issue-term | default: 'pathname' }}"
    theme="{{ site.comments.utterances.theme | default: 'github-light' }}"
    crossorigin="anonymous"
    async>
  </script>
</section>
{% endif %}
