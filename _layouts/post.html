---
layout: base
---

<!-- 읽기 진행률 바 -->
<div class="reading-progress" id="readingProgress"></div>

<img
  src="https://hits.sh/{{ site.url | remove_first: 'https://' | remove_first: 'http://' }}{{ page.url | replace:'index.html','' | append: '.svg' | replace: '/.svg', '.svg' }}?view=today-total&style=flat-square&label=Today/Total&color=4fb1ba&labelColor=243241"
  alt="" role="presentation">
<div class="hits-spacer"></div>

{% include_cached components/post.html post=page no_link_title=true no_excerpt=true hide_image=page.hide_image
hide_description=page.hide_description %}

{% if page.series %}
{% include components/post-series.html %}
{% endif %}

<div class="post-container">
  <div class="post-content">
    <div class="post">
      <article class="post-article">
        {{ content | replace: '<img src=', '<img loading="lazy" src=' }}
      </article>
    </div>
  </div>

  <aside class="toc" id="tocDesktop">
    <a href="#">&lt;맨 위로&gt;</a>
    {% include toc.html html=content %}
  </aside>
</div>

{% if page.series %}
{% include components/post-series.html %}
{% endif %}

<!-- 이전/다음 포스트 네비게이션 -->
{% if page.previous or page.next %}
<nav class="post-nav" aria-label="포스트 네비게이션">
  {% if page.previous %}
  <a class="post-nav-item post-nav-prev" href="{{ page.previous.url }}">
    <span class="post-nav-label">이전 글</span>
    <span class="post-nav-title">{{ page.previous.title }}</span>
  </a>
  {% else %}
  <span class="post-nav-item"></span>
  {% endif %}

  {% if page.next %}
  <a class="post-nav-item post-nav-next" href="{{ page.next.url }}">
    <span class="post-nav-label">다음 글</span>
    <span class="post-nav-title">{{ page.next.title }}</span>
  </a>
  {% else %}
  <span class="post-nav-item"></span>
  {% endif %}
</nav>
{% endif %}

<!-- Mobile TOC FAB -->
<button class="toc-fab" id="tocFab" aria-label="목차 열기" aria-expanded="false">
  <span class="material-icons" aria-hidden="true">toc</span>
</button>
<div class="toc-mobile-overlay" id="tocOverlay"></div>
<div class="toc-mobile-panel" id="tocMobilePanel" role="navigation" aria-label="목차">
  <a href="#">&lt;맨 위로&gt;</a>
  {% include toc.html html=content %}
</div>

{% assign addons = page.addons | default:site.hydejack.post_addons %}
{% unless addons %}{% assign addons = "about,newsletter,related,random" | split:"," %}{% endunless %}

{% for addon in addons %}
{% case addon %}
{% when 'about' %}
{% include_cached components/about.html author=page.author %}
{% when 'related' %}
{% include components/related-posts.html %}
{% when 'comments' %}
{% include body/comments.html %}
{% else %}
{% endcase %}
{% endfor %}

<!-- 이미지 라이트박스 -->
<div class="lightbox-overlay" id="lightboxOverlay">
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
</div>

<script>
(function() {
  var article = document.getElementsByClassName("post-article")[0];

  /* 읽기 진행률 바 */
  var progressBar = document.getElementById('readingProgress');
  function updateProgress() {
    var scrollTop = window.scrollY;
    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
    var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    if (progressBar) progressBar.style.width = progress + '%';
  }

  /* TOC 활성 헤딩 추적 */
  var toc = document.getElementById('tocDesktop');
  if (toc && article) {
    var tocNodesAll = Array.prototype.slice.call(toc.getElementsByTagName("A"), 0);
    var headerNodes = Array.prototype.slice.call(article.getElementsByTagName("*"), 0).filter(function(el) {
      return /^H[1-6]$/.test(el.tagName);
    });
    var before;
    var ticking = false;

    window.addEventListener('scroll', function () {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(function () {
        updateProgress();
        var current = headerNodes.filter(function (header) {
          var headerY = window.pageYOffset + header.getBoundingClientRect().top;
          return window.scrollY >= headerY - 60;
        });
        if (current.length > 0) {
          current = current[current.length - 1];
          var currentA = tocNodesAll.filter(function (tocNode) {
            return tocNode.innerHTML === current.innerHTML;
          })[0];
          if (currentA) {
            if (!before) before = currentA;
            if (before !== currentA) { before.classList.remove("toc-active"); before = currentA; }
            currentA.classList.add("toc-active");
          } else { if (before) before.classList.remove("toc-active"); }
        } else { if (before) before.classList.remove("toc-active"); }
        ticking = false;
      });
    }, false);
  } else {
    window.addEventListener('scroll', function() { requestAnimationFrame(updateProgress); });
  }
  updateProgress();

  /* 코드 블록 복사 버튼 */
  if (article) {
    document.querySelectorAll('pre').forEach(function(pre) {
      if (pre.querySelector('code')) {
        var btn = document.createElement('button');
        btn.className = 'code-copy-btn';
        btn.textContent = '\uBCF5\uC0AC';
        btn.setAttribute('aria-label', '\uCF54\uB4DC \uBCF5\uC0AC');
        btn.addEventListener('click', function() {
          var code = pre.querySelector('code');
          navigator.clipboard.writeText(code.textContent).then(function() {
            btn.textContent = '\uC644\uB8CC!';
            setTimeout(function() { btn.textContent = '\uBCF5\uC0AC'; }, 1500);
          });
        });
        pre.style.position = 'relative';
        pre.appendChild(btn);
      }
    });

    /* 이미지 라이트박스 */
    var overlay = document.getElementById('lightboxOverlay');
    var lbImg = document.getElementById('lightboxImg');
    if (overlay && lbImg) {
      article.querySelectorAll('img').forEach(function(img) {
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', function() {
          lbImg.src = img.src;
          lbImg.alt = img.alt;
          overlay.classList.add('lightbox-open');
        });
      });
      overlay.addEventListener('click', function() { overlay.classList.remove('lightbox-open'); });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('lightbox-open')) { overlay.classList.remove('lightbox-open'); }
      });
    }
  }

  /* Mobile TOC FAB */
  var fab = document.getElementById('tocFab');
  var tocOverlay = document.getElementById('tocOverlay');
  var panel = document.getElementById('tocMobilePanel');
  if (fab && tocOverlay && panel) {
    var tocLinks = panel.querySelectorAll('a:not([href="#"])');
    if (tocLinks.length === 0) {
      fab.style.display = 'none';
    } else {
      var toggleMobileToc = function(open) {
        var isOpen = typeof open === 'boolean' ? open : !panel.classList.contains('toc-mobile-open');
        panel.classList.toggle('toc-mobile-open', isOpen);
        tocOverlay.classList.toggle('toc-mobile-open', isOpen);
        fab.setAttribute('aria-expanded', String(isOpen));
      };
      fab.addEventListener('click', function() { toggleMobileToc(); });
      tocOverlay.addEventListener('click', function() { toggleMobileToc(false); });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && panel.classList.contains('toc-mobile-open')) { toggleMobileToc(false); }
      });
      panel.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function() { toggleMobileToc(false); });
      });
    }
  }

  /* 카테고리/태그 토글 */
  document.querySelectorAll('.meta-toggle').forEach(function(btn) {
    var targetId = btn.getAttribute('aria-controls');
    var target = document.getElementById(targetId);
    if (target) {
      btn.addEventListener('click', function() {
        var expanded = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', String(!expanded));
        target.classList.toggle('meta-open', !expanded);
      });
    }
  });
})();
</script>
